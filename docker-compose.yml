services:
    postgres:
        image: postgres:17-alpine
        container_name: pos-pharmecy-postgres
        restart: unless-stopped
        ports:
            - "${DB_PORT:-5432}:5432"
        environment:
            POSTGRES_USER: "${DB_USERNAME:-postgres}"
            POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
            POSTGRES_DB: "${DB_DATABASE:-pos_pharmecy}"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-pos_pharmecy}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
